name: Update Progress instrument lists

on:
  schedule:
    - cron: "15 0 8 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-progress-instruments
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install reader
        run: python -m pip install --disable-pip-version-check xlrd==2.0.2
      - name: Build static search lists
        env:
          SEC_USER_AGENT: ProgressPortfolio/0.1 neongreeen@users.noreply.github.com
        run: python progress/scripts/update_instruments.py
      - name: Commit changed lists
        run: |
          if git diff --quiet -- progress/data/instruments-jp.json progress/data/instruments-us.json; then
            echo "No instrument changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add progress/data/instruments-jp.json progress/data/instruments-us.json
          git commit -m "data: update Progress instrument lists"
          git push
